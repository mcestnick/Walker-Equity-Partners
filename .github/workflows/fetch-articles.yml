name: Fetch Substack Articles

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS and save as JSON
        run: |
          curl -s -A "Mozilla/5.0 (compatible; RSS reader)" \
            "https://walkerreview.substack.com/feed" \
            -o feed.xml
          python3 -c "
          import json, xml.etree.ElementTree as ET, re
          tree = ET.parse('feed.xml')
          root = tree.getroot()
          items = []
          for item in root.findall('.//item')[:6]:
              title = item.findtext('title') or ''
              link = item.findtext('link') or ''
              date = item.findtext('pubDate') or ''
              desc = re.sub('<[^>]+>', '', item.findtext('description') or '').strip()[:160]
              items.append({'title': title, 'link': link, 'date': date, 'description': desc})
          with open('articles.json', 'w') as f:
              json.dump(items, f)
          print(f'Saved {len(items)} articles')
          "

      - name: Commit articles.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articles.json
          git diff --staged --quiet || git commit -m "Update articles"
          git push
