name: Fetch Substack Articles

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch RSS and save as JSON
        run: |
          curl -s https://walkerreview.substack.com/feed | python3 - << 'EOF'
          import sys, json, xml.etree.ElementTree as ET
          tree = ET.parse('/dev/stdin')
          root = tree.getroot()
          ns = {'content': 'http://purl.org/rss/1.0/modules/content/'}
          items = []
          for item in root.findall('.//item')[:6]:
              title = item.findtext('title') or ''
              link = item.findtext('link') or ''
              date = item.findtext('pubDate') or ''
              desc = item.findtext('description') or ''
              items.append({'title': title, 'link': link, 'date': date, 'description': desc})
          print(json.dumps(items))
          EOF
          curl -s https://walkerreview.substack.com/feed | python3 -c "
          import sys, json, xml.etree.ElementTree as ET, re
          tree = ET.parse(sys.stdin)
          root = tree.getroot()
          items = []
          for item in root.findall('.//item')[:6]:
              title = item.findtext('title') or ''
              link = item.findtext('link') or ''
              date = item.findtext('pubDate') or ''
              desc = re.sub('<[^>]+>', '', item.findtext('description') or '')[:160]
              items.append({'title': title, 'link': link, 'date': date, 'description': desc})
          with open('articles.json', 'w') as f:
              json.dump(items, f)
          "

      - name: Commit articles.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add articles.json
          git diff --staged --quiet || git commit -m "Update articles"
          git push
